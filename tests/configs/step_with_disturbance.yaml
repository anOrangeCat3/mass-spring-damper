# 阶跃响应 + 正弦扰动

y0: [0.0, 0.0]

dt: 0.01
t_end: 10.0
method: RK45

plant_type: MassSpringDamper
plant_params:
  m: 1.0
  c: 0.5
  k: 2.0

controller_type: StepInput
controller_params:
  amplitude: 1.0
  t_step: 0.0

# 正弦扰动
disturbance_type: Sine
disturbance_params:
  amplitude: 0.3
  frequency: 2.0
  phase: 0.0

label: "step + sine disturbance"
