# PID 调参实验配置
# 基础配置 + 扫描参数定义

# 仿真基础配置
y0: [0.0, 0.0]
dt: 0.01
t_end: 10.0
method: RK45

plant_type: MassSpringDamper
plant_params:
  m: 1.0
  c: 0.5
  k: 2.0

controller_type: PID
controller_params:
  kp: 10.0
  ki: 5.0
  kd: 4.0

reference_type: Step
reference_params:
  value: 1.0
  t_step: 0.0

# 参数扫描定义
sweeps:
  kp_sweep:
    param_path: controller_params.kp
    values: [2, 5, 10, 20, 50]
  ki_sweep:
    param_path: controller_params.ki
    values: [0, 1, 5, 10, 20]
  kd_sweep:
    param_path: controller_params.kd
    values: [0, 1, 4, 8, 16]

# 每组扫描要计算的指标
metrics:
  - overshoot
  - settling_time
  - rise_time
  - steady_state_error
  - rmse
  - max_control
  - control_energy
